<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>PDF → Markdown</h1>
    </header>

    <div class="drop-zone" id="dropZone">
      <div class="drop-content">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4m0 0L8 8m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
        </svg>
        <p class="drop-text">Drop PDFs here</p>
        <p class="drop-sub">files or entire folders</p>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-secondary" id="selectFilesBtn">Select Files</button>
      <button class="btn btn-secondary" id="selectFolderBtn">Select Folder</button>
    </div>

    <input type="file" id="fileInput" accept=".pdf" multiple hidden>
    <input type="file" id="folderInput" webkitdirectory hidden>

    <div id="fileList" class="file-list hidden"></div>

    <div class="actions">
      <button class="btn btn-primary" id="convertBtn" disabled>Convert All</button>
    </div>

    <div id="progress" class="progress hidden"></div>
    <div id="results" class="results hidden"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
